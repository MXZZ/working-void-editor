name: Build Binaries

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest
    env:
      GYP_MSVS_VERSION: 2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Locate VC Directory
        shell: pwsh
        run: |
          $vcPath = Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio" -Recurse -Filter "vc.exe" | Select-Object -First 1
          if ($vcPath) {
            $vcDir = $vcPath.Directory.FullName
            echo "VCINSTALLDIR=$vcDir" >> $env:GITHUB_ENV
          } else {
            echo "Could not find vc.exe"
            exit 1
          }

      - name: Build Rust CLI
        run: |
          cd cli
          cargo build --release

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM dependencies
        run: npm ci
        env:
          VCINSTALLDIR: ${{ env.VCINSTALLDIR }}

      - name: Compile Editor
        run: npm run compile

      - name: Archive Rust CLI
        shell: bash
        run: |
          mkdir -p artifacts/cli
          cp cli/target/release/*.exe artifacts/cli/ || true

      - name: Archive Editor Build
        shell: bash
        run: |
          mkdir -p artifacts/editor
          if [ -d "out" ]; then
            cp -r out artifacts/editor/
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-windows
          path: artifacts/
    