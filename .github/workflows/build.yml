name: Build Binaries

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest
    env:
      GYP_MSVS_VERSION: '2022'
      # This bypasses the node-gyp auto-discovery bug
      VCINSTALLDIR: 'C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure NPM
        run: npm config set msvs_version 2022

      - name: Install NPM dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust CLI
        run: |
          cd cli
          cargo build --release

      - name: Compile Editor
        run: npm run compile

      - name: Archive Rust CLI
        shell: bash
        run: |
          mkdir -p artifacts/cli
          cp cli/target/release/*.exe artifacts/cli/ || true

      - name: Archive Editor Build
        shell: bash
        run: |
          mkdir -p artifacts/editor
          if [ -d "out" ]; then
            cp -r out artifacts/editor/
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-windows
          path: artifacts/
