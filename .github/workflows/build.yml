name: Build Binaries

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libx11-dev libxkbfile-dev libsecret-1-dev

      - name: Build Rust CLI
        run: |
          cd cli
          cargo build --release

      - name: Install NPM dependencies
        run: npm ci

      - name: Compile Editor
        run: npm run compile

      - name: Archive Rust CLI
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            mkdir -p artifacts/cli
            cp cli/target/release/*.exe artifacts/cli/ || true
          elif [ "${{ runner.os }}" == "macOS" ]; then
            mkdir -p artifacts/cli
            cp cli/target/release/void-cli artifacts/cli/ || true
          else
            mkdir -p artifacts/cli
            cp cli/target/release/void-cli artifacts/cli/ || true
          fi

      - name: Archive Editor Build
        shell: bash
        run: |
          mkdir -p artifacts/editor
          # Assuming the build output goes to 'out' or similar based on package.json 'main'
          if [ -d "out" ]; then
            cp -r out artifacts/editor/
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}
          path: artifacts/
    